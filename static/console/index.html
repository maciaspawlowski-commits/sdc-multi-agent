<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── API helpers — talk to the FastAPI backend on the same origin ──────────────
const api = {
  async chat(message, sessionId, hitl = false) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, session_id: sessionId || null, hitl: !!hitl }),
    });
    if (!res.ok) throw new Error(`chat ${res.status}: ${await res.text()}`);
    return res.json();
  },
  async resume(sessionId, value) {
    const res = await fetch('/api/chat/resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, value: String(value) }),
    });
    if (!res.ok) throw new Error(`resume ${res.status}: ${await res.text()}`);
    return res.json();
  },
  async clearSession(sessionId) {
    if (!sessionId) return;
    await fetch(`/api/session/${sessionId}`, { method: 'DELETE' });
  },
  async getChaos() {
    const res = await fetch('/api/chaos');
    if (!res.ok) return null;
    return res.json();
  },
  async setChaos(mode, probability, delay_ms) {
    if (mode === 'none') {
      await fetch('/api/chaos', { method: 'DELETE' });
      return { mode: 'none' };
    }
    const res = await fetch('/api/chaos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode, probability: probability/100, delay_ms }),
    });
    if (!res.ok) throw new Error(`chaos ${res.status}`);
    return res.json();
  },
  async health() {
    const res = await fetch('/health');
    if (!res.ok) return null;
    return res.json();
  },
  async listSessions(limit = 50) {
    const res = await fetch(`/api/sessions?limit=${limit}`);
    if (!res.ok) return { sessions: [] };
    return res.json();
  },
  async getSessionMessages(sessionId) {
    const res = await fetch(`/api/session/${encodeURIComponent(sessionId)}/messages`);
    if (!res.ok) return { messages: [] };
    return res.json();
  },
  async getStats() {
    const res = await fetch('/api/stats');
    if (!res.ok) return null;
    return res.json();
  },
  // Stream the Black Friday SSE response from POST /api/simulate/black-friday.
  async streamSimulation(onEvent, signal) {
    const res = await fetch('/api/simulate/black-friday', {
      method: 'POST',
      signal,
    });
    if (!res.ok || !res.body) throw new Error(`sim ${res.status}`);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const block = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        const dataLine = block.split('\n').find(l => l.startsWith('data:'));
        if (!dataLine) continue;
        try { onEvent(JSON.parse(dataLine.slice(5).trim())); } catch (e) { /* ignore */ }
      }
    }
  },
};
window.api = api;

const nowTime = () => {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
};
const uid = (p='m') => `${p}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;

function TopBar({ view, setView, chaosMode, chaosOpen, onChaosToggle, onSimOpen, hitl, onHitlToggle }) {
  return (
    <header className="topbar">
      <div className="brand">
        <span className="brand-mark">S</span>
        <div>
          <div className="brand-name">SDC Operator Console</div>
        </div>
        <span className="brand-sub mono">multi-agent control plane</span>
      </div>
      <div className="tabs">
        {[
          { id: 'chat',  label: 'Chat'  },
          { id: 'graph', label: 'Graph' },
          { id: 'sla',   label: 'SLA'   },
        ].map(n => (
          <button key={n.id} className="tab" aria-current={view===n.id} onClick={()=>setView(n.id)}>
            <span className="dot" /> {n.label}
          </button>
        ))}
      </div>
      <span className="topbar-spacer" />
      <span className="live-pulse"><span className="pulse-dot"/> Ollama · llama3.2 · LangGraph · Dash0</span>
      <button className="chaos-btn" data-active={!!hitl} onClick={onHitlToggle}
        title="Human-in-the-loop: each specialist agent pauses for operator approval before its final answer">
        <Icon.check/> HITL {hitl ? 'on' : 'off'}
      </button>
      <button className="chaos-btn" data-active={chaosMode!=='none' || chaosOpen} onClick={onChaosToggle}>
        <Icon.flame/> Chaos
      </button>
      <button className="chaos-btn" onClick={onSimOpen} title="Run a 10-step Black Friday scenario through every specialist">
        <Icon.cart/> Black Friday
      </button>
    </header>
  );
}

function relativeTime(ts) {
  if (!ts) return '—';
  const ms = Date.now() - ts * 1000;
  if (ms < 0)        return 'just now';
  if (ms < 60_000)   return `${Math.max(1, Math.floor(ms/1000))}s`;
  if (ms < 3600_000) return `${Math.floor(ms/60_000)}m`;
  if (ms < 86400_000) return `${Math.floor(ms/3600_000)}h`;
  return `${Math.floor(ms/86400_000)}d`;
}

function Rail({ sessions, activeSession, onPickSession, activeAgent, stats }) {
  const list = sessions && sessions.length ? sessions : null;
  const total = list ? list.length : 0;
  return (
    <aside className="rail">
      <div className="rail-section">Specialist agents <span/></div>
      <div className="rail-list">
        {window.AGENTS.filter(a=>a.id!=='orchestrator').map(a => {
          const I = Icon[a.id];
          const active = activeAgent === a.id;
          const calls = stats?.byAgent?.[a.id] || 0;
          return (
            <div key={a.id} className="agent-row" data-active={active} style={{['--agent-color']:a.color, ['--agent-bg']:a.bg}}>
              <span className="agent-glyph"><I/></span>
              <div>
                <div className="agent-name">{a.name}</div>
                <div className="agent-meta">{a.desc}</div>
              </div>
              <span className="agent-pill">{active ? 'active' : (calls > 0 ? `${calls} call${calls===1?'':'s'}` : `${window.AGENT_TOOL_COUNTS[a.id]||0}t`)}</span>
            </div>
          );
        })}
      </div>

      <div className="rail-section">Sessions <span style={{fontFamily:"'JetBrains Mono', monospace", color:'var(--fg-3)'}}>{total}</span></div>
      <div className="sessions-list">
        {!list && (
          <div className="session-row" style={{opacity:.6, cursor:'default'}}>
            <span className="session-dot" />
            <div style={{minWidth:0}}>
              <div className="session-title">No sessions yet</div>
              <div className="session-meta">send a message to create one</div>
            </div>
          </div>
        )}
        {list && list.map(s => {
          const a = window.AGENTS.find(x=>x.id===s.last_agent) || {};
          return (
            <div key={s.id} className="session-row" data-active={activeSession===s.id} onClick={()=>onPickSession(s.id)}>
              <span className="session-dot" />
              <div style={{minWidth:0}}>
                <div className="session-title">{s.title}</div>
                <div className="session-meta">
                  {a.short && <span className="session-tag" style={{color:a.color, background:a.bg}}>{a.short}</span>}
                  {a.short && ' · '}{s.msg_count || 0} msgs · <span className="mono">{relativeTime(s.updated_at)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="rail-footer">
        <div className="rail-stat"><span>Routes</span><b>{stats?.totalCalls ?? 0}</b></div>
        <div className="rail-stat"><span>Tool calls</span><b>{stats?.toolCalls ?? 0}</b></div>
        <div className="rail-stat"><span>Avg latency</span><b>{stats?.avgLatencyMs ? (stats.avgLatencyMs/1000).toFixed(2)+'s' : '—'}</b></div>
        <div className="rail-stat"><span>Build</span><b>{stats?.version || '7.x'}</b></div>
      </div>
    </aside>
  );
}

// Inline approval card rendered in the chat stack when the graph is paused at
// a HITL checkpoint.  Uses the same per-agent colour the agent badges use.
function HitlCard({ pending, onResume, busy }) {
  const a = (window.AGENTS || []).find(x => x.id === pending.agent) || {};
  const opts = pending.options || ['approve', 'reject'];
  const runbooks = pending.runbooks || [];
  return (
    <div className="msg agent-msg" style={{['--agent-color']: a.color || 'var(--signal)', ['--agent-bg']: a.bg || 'var(--signal-glow)'}}>
      <div className="agent-card" style={{borderLeftWidth:3, borderLeftStyle:'solid', borderLeftColor:'var(--agent-color)'}}>
        <div className="agent-card-head">
          <span className="agent-card-glyph" style={{color:'var(--signal)'}}>
            {(() => { const I = (window.Icon || {}).check; return I ? <I/> : null; })()}
          </span>
          <div>
            <div className="agent-card-name">{pending.title || 'Operator approval required'}</div>
            <div className="agent-card-route mono">human-in-the-loop · {pending.agent} agent</div>
          </div>
          <div className="agent-card-meta-right">
            <span className="pane-chip live" style={{margin:0}}>● paused</span>
          </div>
        </div>
        <div className="agent-card-body">
          <div style={{color:'var(--fg-1)', marginBottom:10}}>{pending.prompt}</div>
          {pending.proposal_excerpt && (
            <blockquote style={{borderLeft:'2px solid var(--agent-color)', padding:'4px 10px', color:'var(--fg-2)', fontStyle:'italic', margin:'6px 0 12px', background:'var(--bg-1)', borderRadius:4, fontSize:12, maxHeight:160, overflow:'auto'}}>
              {pending.proposal_excerpt}
            </blockquote>
          )}
          {runbooks.length > 0 && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11, color:'var(--fg-3)', letterSpacing:'.06em', marginBottom:6}}>RUNBOOK CHOICES</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {runbooks.map(rb => (
                  <button key={rb} className="suggest-chip" disabled={busy} onClick={()=>onResume(rb)}>{rb}</button>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
            {opts.map(o => {
              const isApprove = /^(approve|approve(d)?)$/i.test(o);
              const isReject  = /^(reject|deny|cancel)$/i.test(o);
              const cls = isApprove ? 'send-btn' : 'suggest-chip';
              return (
                <button key={o} className={cls} disabled={busy}
                  style={isReject ? {background:'var(--danger-bg, var(--bg-2))', color:'var(--danger)', borderColor:'var(--danger)'} : undefined}
                  onClick={()=>onResume(o)}>
                  {o}
                </button>
              );
            })}
          </div>
        </div>
        <div className="agent-card-foot">
          <span>operator decision pending — graph paused at langgraph interrupt()</span>
        </div>
      </div>
    </div>
  );
}

function ChatView({
  messages, inspectId, setInspectId, streamingId, streamProgress,
  composer, setComposer, loading, onSend, onClearSession, sessionId,
  pendingHitl, onResume, hitlBusy,
}) {
  const scrollRef = useRef(null);
  const taRef = useRef(null);

  // auto-scroll to bottom on new message / loading state
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages.length, loading]);

  // auto-grow textarea
  useEffect(() => {
    if (!taRef.current) return;
    taRef.current.style.height = 'auto';
    taRef.current.style.height = Math.min(160, taRef.current.scrollHeight) + 'px';
  }, [composer]);

  const send = () => {
    const text = composer.trim();
    if (!text || loading) return;
    onSend(text);
  };

  const onKey = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); send(); }
  };

  // collect distinct agents seen so far for the header chips
  const agentsInSession = Array.from(new Set(messages.filter(m=>m.role==='agent').map(m=>m.agent)));
  const startedAt = messages[0]?.time || nowTime();

  return (
    <div className="chat-wrap">
      <div className="pane-header">
        <div>
          <div className="pane-title">Live operator session</div>
          <div className="pane-sub mono">
            {sessionId ? `${sessionId.slice(0,18)}…` : 'no session yet'} · started {startedAt} · {messages.length} messages · {agentsInSession.length} specialists
          </div>
        </div>
        <div className="pane-actions">
          {agentsInSession.map(id => {
            const a = window.AGENTS.find(x=>x.id===id) || {};
            return <span key={id} className="pane-chip" style={{color:a.color, borderColor:a.color, background:a.bg}}>{a.short || id}</span>;
          })}
          <span className="pane-chip live">● live</span>
          {sessionId && (
            <button className="pane-chip" style={{cursor:'pointer'}} onClick={onClearSession} title="Clear server-side session and start fresh">
              ↺ reset
            </button>
          )}
        </div>
      </div>

      <div className="chat-scroll" ref={scrollRef}>
        <div className="chat-stack">
          {messages.map(m => m.role === 'user'
            ? <UserMessage key={m.id} msg={m}/>
            : <AgentMessage key={m.id} msg={m}
                onInspect={setInspectId}
                isInspected={inspectId===m.id}
                isStreaming={streamingId===m.id}
                streamProgress={streamingId===m.id?streamProgress:1}/>)}
          {pendingHitl && (
            <HitlCard pending={pendingHitl} onResume={onResume} busy={hitlBusy}/>
          )}
          {loading && (
            <div className="msg agent-msg" style={{['--agent-color']:'var(--orch)', ['--agent-bg']:'var(--orch-bg)'}}>
              <div className="agent-card" style={{padding:'14px 18px'}}>
                <div className="agent-card-route mono" style={{display:'flex',alignItems:'center',gap:10}}>
                  <span className="streaming-caret" /> orchestrator → routing… <span className="kbd" style={{marginLeft:8}}>llama3.2</span>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="composer">
        <div className="composer-inner">
          <div className="composer-box">
            <textarea ref={taRef} className="composer-input" rows="1"
              value={composer}
              onChange={e=>setComposer(e.target.value)}
              onKeyDown={onKey}
              disabled={loading}
              placeholder="Describe an incident, request a change, ask about an SLA…"/>
            <div className="composer-tools">
              <button className="icon-btn" title="Attach (not implemented)"><Icon.attach/></button>
              <button className="send-btn" onClick={send} disabled={loading || !composer.trim()}>
                <Icon.send/> {loading ? 'Sending…' : 'Send'} <span className="kbd">⌘↵</span>
              </button>
            </div>
          </div>
          <div className="suggest-row">
            {window.SUGGESTIONS.map(s => {
              const a = window.AGENTS.find(x=>x.id===s.agent);
              return (
                <button key={s.label} className="suggest-chip" disabled={loading}
                  onClick={()=>setComposer(s.prompt || s.label)}>
                  <span className="agent-dot" style={{background:a.color}} />
                  {s.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function StatusBar({ chaosMode, health, sessionId, messageCount }) {
  const D = window.STATUS_DATA;
  const ok = !!health;
  const model = health?.model || D.ollama;
  const agentCount = health?.agents?.length || 5;
  const kbDocs = health?.knowledge_base
    ? Object.values(health.knowledge_base).reduce((a, x) => a + (x?.runbooks||0) + (x?.records||0), 0)
    : 0;
  return (
    <div className="status-bar">
      <span className="sb"><span className="ico" style={{background: ok ? 'var(--ok)' : 'var(--danger)'}} /> Ollama <b>{model}</b></span>
      <span className="sb"><span className="ico" style={{background:'var(--orch)'}} /> LangGraph <b>{agentCount} agents</b></span>
      <span className="sb">OTel <b>{D.observability}</b></span>
      <span className="sb">session <b>{sessionId ? sessionId.slice(0,8)+'…' : '—'}</b></span>
      <span className="sb-spacer" />
      <span className="sb">msgs <b>{messageCount}</b></span>
      <span className="sb">kb-docs <b>{kbDocs}</b></span>
      <span className="sb">redis <b>{ok ? 'OK' : '?'}</b></span>
      <span className="sb">chaos <b style={{color: chaosMode==='none' ? 'var(--ok)' : 'var(--danger)'}}>{chaosMode}</b></span>
      <span className="sb">{D.build}</span>
    </div>
  );
}

function App() {
  const [view, setView] = useState('chat');
  const [activeSession, setActiveSession] = useState('sess-payment-p1');
  const [inspectId, setInspectId] = useState(null);
  const [simOpen, setSimOpen] = useState(false);
  const [chaosOpen, setChaosOpen] = useState(false);
  const [chaosMode, setChaosMode] = useState('none');
  const [streamingId, setStreamingId] = useState(null);
  const [streamProgress, setStreamProgress] = useState(0);
  const [chaosEvents, setChaosEvents] = useState([]);

  // ── real, live state ────────────────────────────────────────────────────────
  const [messages, setMessages] = useState(() => window.ACTIVE_CONVERSATION || []);
  const [composer, setComposer] = useState('');
  const [loading, setLoading]   = useState(false);
  const [sessionId, setSessionId] = useState(null);
  const [health, setHealth] = useState(null);
  const [sessions, setSessions] = useState(null);    // null = not yet loaded
  const [stats,    setStats]    = useState(null);
  const [hitl,     setHitl]     = useState(false);   // operator-toggled per-session HITL flag
  const [pendingHitl, setPendingHitl] = useState(null);  // {agent, title, prompt, options, runbooks, proposal_excerpt}
  const [hitlBusy, setHitlBusy] = useState(false);

  // pick last agent message for default inspect
  useEffect(() => {
    const last = [...messages].reverse().find(m => m.role==='agent');
    if (last) setInspectId(last.id);
  }, []); // run once on mount

  // streaming-reveal animation runs once per new agent message that hasn't been animated
  const animatedIds = useRef(new Set());
  useEffect(() => {
    const last = messages[messages.length - 1];
    if (!last || last.role !== 'agent' || animatedIds.current.has(last.id)) return;
    animatedIds.current.add(last.id);
    setStreamingId(last.id);
    setStreamProgress(0);
    let raf, start = performance.now();
    const dur = Math.min(2400, (last.text || '').length * 6);
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      setStreamProgress(t);
      if (t < 1) raf = requestAnimationFrame(tick);
      else setStreamingId(null);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [messages]);

  // poll /health for the status bar (ollama, agents, kb counts)
  useEffect(() => {
    let alive = true;
    const tick = async () => {
      const h = await api.health().catch(() => null);
      if (alive) setHealth(h);
    };
    tick();
    const id = setInterval(tick, 6000);
    return () => { alive = false; clearInterval(id); };
  }, []);

  // poll /api/sessions for the rail and /api/stats for the graph + rail footer
  const refreshLiveData = useCallback(async () => {
    const [s, st] = await Promise.all([
      api.listSessions(50).catch(() => ({ sessions: [] })),
      api.getStats().catch(() => null),
    ]);
    setSessions(s.sessions || []);
    if (st) setStats(st);
  }, []);
  useEffect(() => {
    refreshLiveData();
    const id = setInterval(refreshLiveData, 8000);
    return () => clearInterval(id);
  }, [refreshLiveData]);

  // sync the actual chaos state from the server on mount and when the panel opens
  useEffect(() => {
    api.getChaos().then(s => {
      if (s && typeof s.mode === 'string') setChaosMode(s.mode);
    }).catch(()=>{});
  }, [chaosOpen]);

  // chaos cosmetic events (visual flair) — only while a real mode is active
  useEffect(() => {
    if (chaosMode === 'none') { setChaosEvents([]); return; }
    const id = setInterval(() => {
      const map = {
        llm_slow:    { kind: 'llm.slow',    msg: '+3142ms injected on llama3.2 chat' },
        llm_error:   { kind: 'llm.error',   msg: 'ConnectionError on tool_call response' },
        tool_error:  { kind: 'tool.error',  msg: 'classify_priority returned 503 (chaos)' },
        rag_degraded:{ kind: 'rag.empty',   msg: 'search_runbook(k=4) → 0 results' },
      };
      const e = map[chaosMode];
      if (!e) return;
      setChaosEvents(prev => [{ t: nowTime(), ...e }, ...prev].slice(0, 12));
    }, 3500);
    return () => clearInterval(id);
  }, [chaosMode]);

  const inspectMsg = useMemo(
    () => messages.find(m => m.id === inspectId),
    [inspectId, messages]
  );

  // ── shared post-response handler — covers both /api/chat and /api/chat/resume
  const ingestChatResponse = useCallback((data, t0) => {
    const latencyMs = Math.round(performance.now() - t0);
    if (data.session_id) setSessionId(data.session_id);
    if (data.interrupted && data.interrupt) {
      // Pause: render the operator-approval card, do NOT append the
      // proposal as a final agent message yet — it'll come back with the
      // resume response (possibly amended).
      setPendingHitl({ ...data.interrupt, _t0: t0 });
      return;
    }
    const agentMsg = {
      id: uid('a'),
      role: 'agent',
      agent: data.agent,
      time: nowTime(),
      routedFrom: 'orchestrator',
      routingReason: data.routing_reason || '—',
      latencyMs: typeof data.latency_ms === 'number' ? Math.round(data.latency_ms) : latencyMs,
      text: data.response,
      trace: Array.isArray(data.trace) ? data.trace : [],
      spans: [],
    };
    setMessages(prev => [...prev, agentMsg]);
    setInspectId(agentMsg.id);
    setPendingHitl(null);
    refreshLiveData();
  }, [refreshLiveData]);

  // ── send a message to /api/chat ────────────────────────────────────────────
  const handleSend = useCallback(async (text) => {
    const userMsg = { id: uid('u'), role: 'user', author: 'You', time: nowTime(), text };
    setMessages(prev => [...prev, userMsg]);
    setComposer('');
    setLoading(true);
    setPendingHitl(null);
    const t0 = performance.now();
    try {
      const data = await api.chat(text, sessionId, hitl);
      ingestChatResponse(data, t0);
    } catch (err) {
      setMessages(prev => [...prev, {
        id: uid('e'), role: 'agent', agent: 'incident',
        time: nowTime(), routedFrom: 'orchestrator',
        routingReason: 'request failed',
        latencyMs: Math.round(performance.now() - t0),
        text: `**Error**\n\nCould not reach the agent backend: \`${err.message}\``,
        trace: [], spans: [],
      }]);
    } finally {
      setLoading(false);
    }
  }, [sessionId, hitl, ingestChatResponse]);

  // ── resume a paused HITL session with the operator's choice ───────────────
  const handleResume = useCallback(async (value) => {
    if (!sessionId || !pendingHitl) return;
    setHitlBusy(true);
    const t0 = performance.now();
    try {
      const data = await api.resume(sessionId, value);
      ingestChatResponse(data, t0);
    } catch (err) {
      setMessages(prev => [...prev, {
        id: uid('e'), role: 'agent', agent: pendingHitl.agent || 'incident',
        time: nowTime(), routingReason: 'resume failed',
        text: `**Error**\n\nCould not resume the agent: \`${err.message}\``,
        trace: [], spans: [],
      }]);
      setPendingHitl(null);
    } finally {
      setHitlBusy(false);
    }
  }, [sessionId, pendingHitl, ingestChatResponse]);

  // Operator clicks a session in the rail — load its messages and switch to it
  const handlePickSession = useCallback(async (sid) => {
    if (!sid || sid === sessionId) return;
    try {
      const data = await api.getSessionMessages(sid);
      setSessionId(sid);
      setMessages(data.messages || []);
      const lastAgent = [...(data.messages || [])].reverse().find(m => m.role === 'agent');
      setInspectId(lastAgent?.id || null);
      setView('chat');
    } catch (e) { /* ignore */ }
  }, [sessionId]);

  const handleClearSession = useCallback(async () => {
    if (sessionId) await api.clearSession(sessionId).catch(()=>{});
    setSessionId(null);
    setMessages([]);
    setInspectId(null);
    refreshLiveData();
  }, [sessionId, refreshLiveData]);

  // setMode dispatched from ChaosPanel — also pushes the mode to the server.
  const handleChaosMode = useCallback(async (mode) => {
    setChaosMode(mode);
    try { await api.setChaos(mode, 50, 3000); } catch (e) { /* keep UI optimistic */ }
  }, []);

  const graphTotals = useMemo(() => {
    const byAgent = { incident: 47, change: 23, problem: 12, service: 31, sla: 19 };
    return {
      byAgent,
      totalCalls: Object.values(byAgent).reduce((a,b)=>a+b,0),
      toolCalls: 412,
      avgLatency: 1880,
    };
  }, []);

  return (
    <>
      <div className="shell" data-inspector={view==='chat' ? 'visible' : 'hidden'}>
        <TopBar view={view} setView={setView}
          chaosMode={chaosMode} chaosOpen={chaosOpen}
          onChaosToggle={()=>setChaosOpen(o=>!o)}
          onSimOpen={()=>setSimOpen(true)}
          hitl={hitl} onHitlToggle={()=>setHitl(v=>!v)}/>

        <Rail
          sessions={sessions}
          activeSession={sessionId}
          onPickSession={handlePickSession}
          activeAgent={inspectMsg?.agent}
          stats={stats}/>

        <main className="main">
          {view === 'chat' && (
            <ChatView
              messages={messages}
              inspectId={inspectId} setInspectId={setInspectId}
              streamingId={streamingId} streamProgress={streamProgress}
              composer={composer} setComposer={setComposer}
              loading={loading}
              onSend={handleSend}
              onClearSession={handleClearSession}
              sessionId={sessionId}
              pendingHitl={pendingHitl}
              onResume={handleResume}
              hitlBusy={hitlBusy}/>
          )}
          {view === 'graph' && (
            <OrchestratorGraph
              activeAgent={inspectMsg?.agent}
              recentRoute={inspectMsg?.agent}
              totals={stats ? {
                byAgent:    stats.byAgent || {},
                totalCalls: stats.totalCalls || 0,
                toolCalls:  stats.toolCalls || 0,
                avgLatency: stats.avgLatencyMs || 0,
              } : graphTotals}/>
          )}
          {view === 'sla' && <SLAPane/>}
        </main>

        <aside className="inspector">
          <Inspector message={inspectMsg}/>
        </aside>

        <StatusBar chaosMode={chaosMode} health={health}
          sessionId={sessionId} messageCount={messages.length}/>
      </div>

      <ChaosPanel open={chaosOpen} mode={chaosMode} setMode={handleChaosMode}
        onClose={()=>setChaosOpen(false)} events={chaosEvents}/>

      <SimDrawer open={simOpen} onClose={()=>setSimOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
