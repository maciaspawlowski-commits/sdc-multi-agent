apiVersion: v1
kind: ConfigMap
metadata:
  name: sdc-config
  namespace: sdc
data:
  # LLM backend
  OLLAMA_HOST: "http://ollama:11434"
  LLM_MODEL: "llama3.2:1b"

  # Vector store (ChromaDB server mode)
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8000"

  # Session store
  REDIS_URL: "redis://redis:6379"
  SESSION_TTL_SECONDS: "86400"

  # OpenTelemetry
  OTEL_SERVICE_NAME: "sdc-agents"
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://ingress.europe-west4.gcp.dash0.com"
  # Public Dash0 HTTPS ingress — used by the browser RUM SDK (@dash0/sdk-web).
  # OTEL_EXPORTER_OTLP_ENDPOINT is overwritten inside the pod by the Dash0
  # operator's collector DaemonSet; this var keeps the original public URL
  # reachable by browser clients.
  DASH0_INGRESS_ENDPOINT: "https://ingress.europe-west4.gcp.dash0.com"
  ENVIRONMENT: "k8s"
  APP_VERSION: "7.1.0"

  # LangSmith
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_PROJECT: "sdc-agents"
  LANGSMITH_PROJECT: "sdc-agents"
