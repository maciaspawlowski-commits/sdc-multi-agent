apiVersion: v1
kind: Secret
metadata:
  name: sdc-secrets
  namespace: sdc
type: Opaque
# !! DO NOT commit real values here !!
# Populate via kubectl instead:
#
#   kubectl create secret generic sdc-secrets -n sdc \
#     --from-literal=DASH0_AUTH_TOKEN=<your_dash0_token> \
#     --from-literal=LANGCHAIN_API_KEY=<your_langsmith_key> \
#     --from-literal=LANGSMITH_API_KEY=<your_langsmith_key>
#
# If you apply this file directly, replace the empty strings with
# base64-encoded values:  echo -n "mytoken" | base64
data:
  DASH0_AUTH_TOKEN: ""
  LANGCHAIN_API_KEY: ""
  LANGSMITH_API_KEY: ""
