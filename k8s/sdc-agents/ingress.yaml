# Optional — requires the NGINX ingress addon:
#   minikube addons enable ingress
#
# Then add to /etc/hosts:
#   $(minikube ip)  sdc.local
#
# Apply with:
#   kubectl apply -f k8s/sdc-agents/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sdc-agents
  namespace: sdc
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: sdc.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sdc-agents
                port:
                  number: 8000
