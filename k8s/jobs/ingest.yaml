apiVersion: batch/v1
kind: Job
metadata:
  name: sdc-ingest
  namespace: sdc
spec:
  # Auto-delete 5 minutes after completion
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for ChromaDB to be ready before ingesting
        - name: wait-for-chromadb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://chromadb:8000/api/v2/heartbeat > /dev/null 2>&1; do
                echo "waiting for chromadb..."; sleep 5
              done
              echo "chromadb ready — starting ingest"
      containers:
        - name: ingest
          image: sdc-agents:latest
          imagePullPolicy: Never
          command: ["python", "-m", "sdc.ingest"]
          env:
            - name: CHROMA_HOST
              value: "chromadb"
            - name: CHROMA_PORT
              value: "8000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: embedding-cache
              mountPath: /root/.cache/chroma
      volumes:
        - name: embedding-cache
          persistentVolumeClaim:
            claimName: embedding-cache
