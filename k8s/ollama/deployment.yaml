apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: sdc
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          # Use a local-only tag so Kubernetes never tries Docker Hub.
          # The tag `cached-local` is created inside the minikube docker daemon
          # via `docker tag ollama/ollama:latest ollama/ollama:cached-local`.
          # imagePullPolicy: Never guarantees the kubelet uses the cached image.
          image: ollama/ollama:cached-local
          imagePullPolicy: Never
          ports:
            - containerPort: 11434
          resources:
            # Bumped from 4 → 12 CPUs (host has 22 vCPUs).  Ollama is purely
            # CPU-bound on minikube without GPU passthrough; the prior 4 CPU
            # ceiling was the dominant cause of multi-second per-token latency.
            requests:
              memory: "6Gi"
              cpu: "4"
            limits:
              memory: "8Gi"
              cpu: "12"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
