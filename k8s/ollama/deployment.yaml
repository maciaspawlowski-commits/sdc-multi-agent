apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: sdc
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          # Use a local-only tag so Kubernetes never tries Docker Hub.
          # The tag `cached-local` is created inside the minikube docker daemon
          # via `docker tag ollama/ollama:latest ollama/ollama:cached-local`.
          # imagePullPolicy: Never guarantees the kubelet uses the cached image.
          image: ollama/ollama:cached-local
          imagePullPolicy: Never
          ports:
            - containerPort: 11434
          resources:
            # CPU limit kept at 4 deliberately.  LLM inference on llama.cpp
            # is memory-bandwidth-bound, not core-bound — bumping limit to
            # 12 CPUs measurably *slows* the 3 B model (more threads → more
            # cache/NUMA contention).  4 is a sweet spot for Q4_K_M on AVX2.
            requests:
              memory: "6Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
